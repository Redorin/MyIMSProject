<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Campus Pulse</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <script>console.log('backend/dashboard.html loaded'); alert('backend dashboard page loaded');</script>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-compass"></i>
                <div>
                    <h2>Campus Pulse</h2>
                    <p>Your guide to campus spaces</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-item active" onclick="navigate('/dashboard.html'); return false;">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="/campus-map.html" class="nav-item" onclick="navigate('/campus-map.html'); return false;">
                    <i class="fas fa-map"></i> Campus Map
                </a>
                <a href="/settings.html" class="nav-item" onclick="navigate('/settings.html'); return false;">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="dashboard-header">
                <h1>Campus Pulse</h1>
                <div class="header-right">
                    <div class="profile-dropdown">
                        <button class="profile-btn">
                            <i class="fas fa-user-circle"></i>
                        </button>
                        <div class="dropdown-menu">
                            <div class="dropdown-header">
                                <p class="user-name">Alex Doe</p>
                                <p class="user-email">alex.doe@university.edu</p>
                            </div>
                            <a href="/settings.html" class="dropdown-item profile-link">
                                <span>Profile</span>
                            </a>
                            <a href="/settings.html" class="dropdown-item">
                                <span>Settings</span>
                            </a>
                            <a href="javascript:void(0);" onclick="logout();" class="dropdown-item logout-link">
                                <span>Log out</span>
                            </a>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Live Space Availability Section (populated from API) -->
            <section class="availability-section">
                <h2>Live Space Availability</h2>
                <div class="spaces-grid" id="spacesGrid">
                    <!-- Spaces will be rendered here from the API -->
                </div>
            </section>
        </main>
    </div>

    <script>
        if (!window.logout) {
            window.logout = function() {
                localStorage.removeItem('user');
                localStorage.removeItem('token');
                sessionStorage.clear();
                window.location.href = '/index.html';
            };
        }
        async function fetchSpacesFallback() {
            try {
                const res = await fetch('http://127.0.0.1:8001/api/spaces');
                if (!res.ok) return;
                const spaces = await res.json();
                const grid = document.getElementById('spacesGrid');
                if (!grid) return;
                grid.innerHTML = '';
                spaces.forEach(space => {
                    const percentage = space.capacity ? Math.round((space.occupancy / space.capacity) * 100) : 0;
                    let status = (space.status || '').toString().toLowerCase();
                    if (!status) {
                        if (percentage >= 80) status = 'high';
                        else if (percentage >= 50) status = 'medium';
                        else status = 'low';
                    }
                    const image = "url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 250%22><rect fill=%22%23cbd5e1%22 width=%22400%22 height=%22250%22/></svg>')";
                    const card = document.createElement('div');
                    card.className = 'space-card';
                    card.innerHTML = `
                        <div class="space-image" style="background-image: ${image}"></div>
                        <div class="space-info">
                            <h3>${space.name}</h3>
                            <p class="space-type">${space.type || ''}</p>
                            <div class="space-capacity">
                                <span class="capacity-number">${space.occupancy} / ${space.capacity}</span>
                                <span class="capacity-badge ${status}">${status.charAt(0).toUpperCase() + status.slice(1)}</span>
                            </div>
                            <div class="capacity-bar"><div class="capacity-fill" style="width: ${percentage}%"></div></div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch(e) { console.error('Fallback fetchSpaces error', e); }
        }
        fetchSpacesFallback();
        setInterval(fetchSpacesFallback, 5000);
    </script>
    <script src="/js/app.js" onerror="console.error('failed to load /js/app.js');"></script>
</body>
</html>
